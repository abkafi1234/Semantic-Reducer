name: Publish Python Package to PyPI

# This workflow runs automatically ONLY when you publish a new Release on GitHub
on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # REQUIRED for PyPI Trusted Publishing (OIDC)
    # This block allows GitHub to securely authenticate with PyPI without any passwords.
    permissions:
      id-token: write
      contents: read

    steps:
    # 1. Pull your latest code from the GitHub repository
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. Set up a clean Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Install the official PyPA build tool
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    # 4. Compile your code into a source archive (.tar.gz) and a wheel (.whl)
    - name: Build package distributions
      run: python -m build

    # 5. Securely upload the built files to PyPI
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      # Note: No 'with: password: ...' is needed because of the permissions block above!
